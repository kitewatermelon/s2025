# Compression Ablation — VQ-GAN Stage 1, ratio=8 (16×16 latent), CT
# Architecture: 3 stride-2 ops → H,W: 128→64→32→16; D: 9→4→2→1 on n9 data
# D_latent=1 when trained on n=9  →  VDM num_slices=9 compatible
# GPU: 5   Run: python train_vqgan.py -c configs/comp_abl/ae_ratio8_ct.yaml
default:
  random_seed: 42
  device: 5
  experiment_name: comp_abl_ratio8_ct
  checkpoint_dir: "checkpoints"

optim:
  amp: True
  lr_generator: 1e-4
  lr_discriminator: 5e-4
  num_epochs: 1000
  val_every: 100
  log_interval: 1
  save_interval: 200

vqvae:
  spatial_dims: 3
  in_channels: 1
  out_channels: 1
  num_channels:
    128,
    256,
    512,
    512
  num_res_channels: 256
  num_res_layers: 3
  # ratio-8: 3 stride-2 ops  →  H,W: 128→64→32→16  (16×16 latent)
  # D: 9→4→2→1 (D_latent=1 with n9 input)
  downsample_parameters:
    1:
      - 2  # stride
      - 4  # kernel
      - 1  # dilation
      - 1  # padding
    2:
      - 2
      - 4
      - 1
      - 1
    3:
      - 2
      - 4
      - 1
      - 1
    4:
      - 1
      - 3
      - 1
      - 1
  upsample_parameters:
    1:
      - 1  # stride
      - 3  # kernel
      - 1  # dilation
      - 1  # padding
      - 0  # output_padding
    2:
      - 2
      - 4
      - 1
      - 1
      - 0
    3:
      - 2
      - 4
      - 1
      - 1
      - 0
    4:
      - 2
      - 4
      - 1
      - 1
      - 0
  num_embeddings: 2048
  embedding_dim: 1

discriminator:
  spatial_dims: 2
  in_channels: 1
  out_channels: 1
  num_layers_d: 2
  num_channels: 256

dataset:
  data_path: "dataset/train/n9"
  anatomy:
    - "AB"
    - "HN"
    - "TH"
  modality:
    - "ct"
  overlap: 0.25
  train_batch_size: 64
  val_batch_size: 64
  train_shuffle: True
  val_shuffle: False
  num_workers: 4
  minv: 0.0
  maxv: 1.0
  interpolate: true
  interpolation_size: [128, 128]
  augment: False
  rand_adj_contrast:
    prob: 0.5
    gamma:
      - 0.5
      - 1.5
